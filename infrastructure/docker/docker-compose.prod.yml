version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: haswell_security
      POSTGRES_USER: haswell
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
  cms:
    build:
      context: ../../apps/cms
      dockerfile: Dockerfile
    restart: always
    depends_on: [postgres]
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: haswell_security
      DATABASE_USERNAME: haswell
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    restart: always
    depends_on: [cms]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL}
  nginx:
    image: nginx:alpine
    restart: always
    ports: ["80:80"]
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [frontend,cms]
volumes:
  postgres_data:
